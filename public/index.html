<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chatroom</title>
<style>
  :root {
    color-scheme: dark;
    --bg-base: #121212;
    --surface: #181818;
    --surface-2: #1f1f1f;
    --surface-card: #252525;
    --text: #ffffff;
    --text-muted: #b3b3b3;
    --accent: #1ed760;
    --accent-dim: #1db954;
    --border: #4d4d4d;
    --negative: #f3727f;
    --shadow-heavy: rgba(0, 0, 0, 0.5) 0px 8px 24px;
    --shadow-medium: rgba(0, 0, 0, 0.3) 0px 8px 8px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", Roboto, sans-serif;
    background: var(--bg-base);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  button {
    font-family: inherit;
  }

  #app {
    width: 100%;
    max-width: 920px;
    height: 100vh;
    height: 100dvh;
    max-height: 760px;
    background: var(--surface);
    display: flex;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-heavy);
  }

  /* ---------- Login ---------- */
  #login {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    animation: fadeIn 0.4s ease both;
  }
  #login h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  #login .accent-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 8px;
    box-shadow: 0 0 12px var(--accent);
  }
  #login input {
    width: 100%;
    max-width: 280px;
    padding: 12px 16px;
    border-radius: 500px;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    font-size: 16px;
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  #login input:focus {
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(0, 0, 0) 0px 0px 0px 2px inset;
  }
  .btn-pill {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 40px;
    border-radius: 500px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .btn-pill:hover { background: #22e065; transform: scale(1.03); }
  .btn-pill:active { transform: scale(0.97); }

  /* ---------- Layout ---------- */
  #chat-ui { display: none; width: 100%; height: 100%; }
  #chat-ui.active { display: flex; animation: fadeIn 0.3s ease both; }

  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg-base);
    display: flex;
    flex-direction: column;
    padding: 16px 8px;
    gap: 4px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  #sidebar h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    font-weight: 700;
    margin: 8px 12px 6px;
  }
  #room-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    flex: 1;
  }
  .room-item {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .room-item:hover { background: var(--surface-2); color: var(--text); }
  .room-item.active {
    background: var(--surface-card);
    color: var(--text);
    font-weight: 700;
  }
  .room-item.active::before {
    content: "# ";
    color: var(--accent);
  }
  .room-item:not(.active)::before {
    content: "# ";
    color: var(--text-muted);
  }
  #create-room-btn {
    margin: 8px 4px 0;
    background: var(--surface-2);
    color: var(--text);
    border: none;
    padding: 10px 12px;
    border-radius: 500px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.15s ease;
  }
  #create-room-btn:hover { background: #2a2a2a; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header .room-title {
    font-size: 18px;
    font-weight: 700;
  }
  #presence-pill {
    background: var(--surface-2);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 500px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
  }
  #presence-pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--surface);
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    animation: msgIn 0.28s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg .sender {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin: 0 6px 3px;
  }
  .msg .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    background: var(--surface-card);
    color: var(--text);
    word-break: break-word;
    box-shadow: var(--shadow-medium);
  }
  .msg.me .bubble { background: var(--accent); color: #000; font-weight: 500; }
  .msg .bubble img {
    max-width: 240px;
    max-height: 240px;
    border-radius: 10px;
    display: block;
  }
  .msg .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin: 3px 6px 0;
  }

  .reactions-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin: 4px 6px 0;
  }
  .reaction-chip {
    background: var(--surface-2);
    border: 1px solid transparent;
    color: var(--text);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 500px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: transform 0.1s ease, border-color 0.15s ease;
  }
  .reaction-chip:hover { transform: scale(1.08); }
  .reaction-chip.mine { border-color: var(--accent); color: var(--accent); }
  .add-reaction-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 500px;
    cursor: pointer;
  }
  .add-reaction-btn:hover { color: var(--text); border-color: var(--text-muted); }

  .emoji-picker {
    display: flex;
    gap: 4px;
    background: var(--surface-card);
    padding: 6px;
    border-radius: 500px;
    box-shadow: var(--shadow-heavy);
    position: absolute;
    animation: popIn 0.15s ease both;
    z-index: 10;
  }
  .emoji-picker button {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    transition: background 0.1s ease;
  }
  .emoji-picker button:hover { background: var(--surface-2); }

  .system {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin: 2px 0;
    animation: fadeIn 0.3s ease both;
  }

  #typing-indicator {
    height: 18px;
    padding: 0 20px 4px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-dots { display: inline-flex; gap: 2px; }
  .typing-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

  #image-preview {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 20px 0;
  }
  #image-preview.active { display: flex; }
  #image-preview img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 8px;
  }
  #image-preview button {
    background: var(--surface-2);
    color: var(--text-muted);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
  }

  #composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: var(--surface);
  }
  #composer input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border-radius: 500px;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    font-size: 16px;
    outline: none;
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
  }
  #upload-btn, #send-btn {
    background: var(--surface-2);
    color: var(--text);
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    touch-action: manipulation;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  #send-btn { background: var(--accent); color: #000; }
  #upload-btn:hover { background: #2a2a2a; }
  #send-btn:hover { background: #22e065; transform: scale(1.05); }
  #send-btn:active, #upload-btn:active { transform: scale(0.92); }

  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-3px); opacity: 1; }
  }

  #messages::-webkit-scrollbar, #room-list::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-thumb, #room-list::-webkit-scrollbar-thumb {
    background: var(--surface-card);
    border-radius: 4px;
  }

  @media (max-width: 640px) {
    #sidebar { width: 76px; }
    #sidebar h3 { display: none; }
    .room-item { text-align: center; font-size: 11px; padding: 10px 4px; }
    .room-item.active::before, .room-item:not(.active)::before { content: ""; }
    #create-room-btn { font-size: 10px; padding: 8px 4px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="login">
    <h2><span class="accent-dot"></span>Chatroom</h2>
    <input id="username-input" placeholder="닉네임을 입력하세요" maxlength="30" />
    <button id="join-btn" class="btn-pill">입장하기</button>
  </div>

  <div id="chat-ui">
    <aside id="sidebar">
      <h3>채팅방</h3>
      <ul id="room-list"></ul>
      <button id="create-room-btn">+ 방 만들기</button>
    </aside>

    <div id="main">
      <header>
        <span class="room-title" id="room-title">일반</span>
        <span id="presence-pill"><span class="dot"></span><span id="presence-count">0</span>명 접속 중</span>
      </header>

      <div id="messages"></div>

      <div id="typing-indicator"></div>

      <div id="image-preview">
        <img id="preview-img" src="" alt="" />
        <button id="remove-preview">×</button>
      </div>

      <form id="composer">
        <input type="file" id="file-input" accept="image/*" class="hidden" />
        <button type="button" id="upload-btn" title="이미지 첨부">📎</button>
        <input type="text" id="message-input" placeholder="메시지를 입력하세요" autocomplete="off" maxlength="500" />
        <button type="submit" id="send-btn" title="전송">➤</button>
      </form>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let username = "";
  let currentRoomId = null;
  let rooms = [];
  let pendingImage = null; // { url, mimeType }
  let typingTimeout = null;
  const typingUsers = new Set();

  const loginEl = document.getElementById("login");
  const chatUiEl = document.getElementById("chat-ui");
  const usernameInput = document.getElementById("username-input");
  const joinBtn = document.getElementById("join-btn");
  const roomListEl = document.getElementById("room-list");
  const createRoomBtn = document.getElementById("create-room-btn");
  const roomTitleEl = document.getElementById("room-title");
  const presenceCountEl = document.getElementById("presence-count");
  const messagesEl = document.getElementById("messages");
  const typingIndicatorEl = document.getElementById("typing-indicator");
  const composer = document.getElementById("composer");
  const messageInput = document.getElementById("message-input");
  const fileInput = document.getElementById("file-input");
  const uploadBtn = document.getElementById("upload-btn");
  const imagePreviewEl = document.getElementById("image-preview");
  const previewImgEl = document.getElementById("preview-img");
  const removePreviewBtn = document.getElementById("remove-preview");

  const EMOJI_SET = ["👍", "❤️", "😂", "😮", "😢"];

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function closeAnyEmojiPicker() {
    document.querySelectorAll(".emoji-picker").forEach((el) => el.remove());
  }

  function renderReactions(container, messageId, reactions) {
    container.innerHTML = "";
    const grouped = new Map();
    reactions.forEach(({ emoji, username: who }) => {
      if (!grouped.has(emoji)) grouped.set(emoji, []);
      grouped.get(emoji).push(who);
    });

    grouped.forEach((users, emoji) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "reaction-chip" + (users.includes(username) ? " mine" : "");
      chip.textContent = `${emoji} ${users.length}`;
      chip.title = users.join(", ");
      chip.addEventListener("click", () => {
        socket.emit("reaction", { messageId, emoji });
      });
      container.appendChild(chip);
    });

    const addBtn = document.createElement("button");
    addBtn.type = "button";
    addBtn.className = "add-reaction-btn";
    addBtn.textContent = "+";
    addBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      closeAnyEmojiPicker();
      const picker = document.createElement("div");
      picker.className = "emoji-picker";
      EMOJI_SET.forEach((emoji) => {
        const b = document.createElement("button");
        b.textContent = emoji;
        b.addEventListener("click", () => {
          socket.emit("reaction", { messageId, emoji });
          closeAnyEmojiPicker();
        });
        picker.appendChild(b);
      });
      document.body.appendChild(picker);
      const rect = addBtn.getBoundingClientRect();
      picker.style.top = `${rect.top - 44 + window.scrollY}px`;
      picker.style.left = `${rect.left + window.scrollX}px`;
    });
    container.appendChild(addBtn);
  }

  function renderMessage(msg) {
    const { id, username: sender, content, image_url, created_at, reactions = [] } = msg;
    const wrapper = document.createElement("div");
    wrapper.className = "msg" + (sender === username ? " me" : "");
    wrapper.dataset.messageId = id;

    if (sender !== username) {
      const senderEl = document.createElement("div");
      senderEl.className = "sender";
      senderEl.textContent = sender;
      wrapper.appendChild(senderEl);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (image_url) {
      const img = document.createElement("img");
      img.src = image_url;
      img.alt = "attachment";
      bubble.appendChild(img);
    }
    if (content) {
      const p = document.createElement("div");
      p.textContent = content;
      if (image_url) p.style.marginTop = "6px";
      bubble.appendChild(p);
    }

    const meta = document.createElement("div");
    meta.className = "meta";
    const time = created_at
      ? new Date(created_at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })
      : "";
    meta.textContent = time;

    const reactionsRow = document.createElement("div");
    reactionsRow.className = "reactions-row";
    renderReactions(reactionsRow, id, reactions);

    wrapper.appendChild(bubble);
    wrapper.appendChild(meta);
    wrapper.appendChild(reactionsRow);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function renderSystem(text) {
    const el = document.createElement("div");
    el.className = "system";
    el.textContent = text;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function updateTypingIndicator() {
    if (typingUsers.size === 0) {
      typingIndicatorEl.innerHTML = "";
      return;
    }
    const names = [...typingUsers].join(", ");
    typingIndicatorEl.innerHTML =
      `${names}님이 입력 중 <span class="typing-dots"><span></span><span></span><span></span></span>`;
  }

  async function loadHistory(roomId) {
    messagesEl.innerHTML = "";
    try {
      const res = await fetch(`/api/messages?room_id=${roomId}`);
      const data = await res.json();
      data.forEach(renderMessage);
    } catch (err) {
      console.error("Failed to load history", err);
    }
  }

  async function loadRooms() {
    const res = await fetch("/api/rooms");
    rooms = await res.json();
    renderRoomList();
    if (!currentRoomId && rooms.length > 0) {
      switchRoom(rooms[0].id);
    }
  }

  function renderRoomList() {
    roomListEl.innerHTML = "";
    rooms.forEach((room) => {
      const li = document.createElement("li");
      li.className = "room-item" + (room.id === currentRoomId ? " active" : "");
      li.textContent = room.name;
      li.addEventListener("click", () => switchRoom(room.id));
      roomListEl.appendChild(li);
    });
  }

  function switchRoom(roomId) {
    if (roomId === currentRoomId) return;
    currentRoomId = roomId;
    const room = rooms.find((r) => r.id === roomId);
    roomTitleEl.textContent = room ? room.name : "";
    typingUsers.clear();
    updateTypingIndicator();
    renderRoomList();
    socket.emit("join room", { roomId, username });
    loadHistory(roomId);
  }

  async function enterChat() {
    const name = usernameInput.value.trim();
    if (!name) return;
    username = name;
    loginEl.classList.add("hidden");
    chatUiEl.classList.add("active");
    await loadRooms();
    messageInput.focus();
  }

  joinBtn.addEventListener("click", enterChat);
  usernameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") enterChat();
  });

  createRoomBtn.addEventListener("click", async () => {
    const name = prompt("새 채팅방 이름을 입력하세요");
    if (!name || !name.trim()) return;
    const res = await fetch("/api/rooms", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name.trim() }),
    });
    const room = await res.json();
    rooms.push(room);
    switchRoom(room.id);
  });

  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("file", file);
    uploadBtn.textContent = "…";
    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      pendingImage = data.url;
      previewImgEl.src = data.url;
      imagePreviewEl.classList.add("active");
    } catch (err) {
      console.error("Upload failed", err);
    } finally {
      uploadBtn.textContent = "📎";
      fileInput.value = "";
    }
  });

  removePreviewBtn.addEventListener("click", () => {
    pendingImage = null;
    imagePreviewEl.classList.remove("active");
  });

  let isTyping = false;
  messageInput.addEventListener("input", () => {
    if (!isTyping) {
      isTyping = true;
      socket.emit("typing");
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isTyping = false;
      socket.emit("stop typing");
    }, 1200);
  });

  composer.addEventListener("submit", (e) => {
    e.preventDefault();
    const content = messageInput.value.trim();
    if (!content && !pendingImage) return;
    socket.emit("chat message", { content, imageUrl: pendingImage });
    messageInput.value = "";
    pendingImage = null;
    imagePreviewEl.classList.remove("active");
    clearTimeout(typingTimeout);
    if (isTyping) {
      isTyping = false;
      socket.emit("stop typing");
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".add-reaction-btn") && !e.target.closest(".emoji-picker")) {
      closeAnyEmojiPicker();
    }
  });

  socket.on("chat message", (msg) => {
    renderMessage(msg);
  });

  socket.on("reactions update", ({ messageId, reactions }) => {
    const wrapper = messagesEl.querySelector(`[data-message-id="${messageId}"]`);
    if (!wrapper) return;
    const row = wrapper.querySelector(".reactions-row");
    renderReactions(row, messageId, reactions);
  });

  socket.on("system message", renderSystem);

  socket.on("presence", (list) => {
    presenceCountEl.textContent = list.length;
  });

  socket.on("typing", ({ username: who }) => {
    if (who === username) return;
    typingUsers.add(who);
    updateTypingIndicator();
  });

  socket.on("stop typing", ({ username: who }) => {
    typingUsers.delete(who);
    updateTypingIndicator();
  });
</script>
</body>
</html>
