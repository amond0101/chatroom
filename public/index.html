<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chatroom</title>
<style>
  :root {
    color-scheme: dark;
    --bg-base: #121212;
    --surface: #181818;
    --surface-2: #1f1f1f;
    --surface-card: #252525;
    --text: #ffffff;
    --text-muted: #b3b3b3;
    --accent: #1ed760;
    --accent-dim: #1db954;
    --border: #4d4d4d;
    --negative: #f3727f;
    --shadow-heavy: rgba(0, 0, 0, 0.5) 0px 8px 24px;
    --shadow-medium: rgba(0, 0, 0, 0.3) 0px 8px 8px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", Roboto, sans-serif;
    background: var(--bg-base);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  button {
    font-family: inherit;
  }

  #app {
    width: 100%;
    max-width: 920px;
    height: 100vh;
    height: 100dvh;
    max-height: 760px;
    background: var(--surface);
    display: flex;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-heavy);
  }

  /* ---------- Login ---------- */
  #login {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    animation: fadeIn 0.4s ease both;
  }
  #login h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  #login .accent-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 8px;
    box-shadow: 0 0 12px var(--accent);
  }
  #login input {
    width: 100%;
    max-width: 280px;
    padding: 12px 16px;
    border-radius: 500px;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    font-size: 16px;
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  #login input:focus {
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(0, 0, 0) 0px 0px 0px 2px inset;
  }
  .btn-pill {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 40px;
    border-radius: 500px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  .btn-pill:hover { background: #22e065; transform: scale(1.03); }
  .btn-pill:active { transform: scale(0.97); }

  #auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    padding: 4px;
    border-radius: 500px;
    margin-bottom: 4px;
  }
  #auth-tabs .tab {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 500px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #auth-tabs .tab.active { background: var(--accent); color: #000; }
  .auth-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .auth-message {
    font-size: 12px;
    min-height: 16px;
    text-align: center;
    max-width: 280px;
  }
  .auth-message.error { color: var(--negative); }
  .auth-message.success { color: var(--accent); }
  #logout-btn {
    background: var(--surface-2);
    color: var(--text-muted);
    border: none;
    padding: 6px 14px;
    border-radius: 500px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-left: 8px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #logout-btn:hover { background: var(--negative); color: #000; }

  /* ---------- Layout ---------- */
  #chat-ui { display: none; width: 100%; height: 100%; }
  #chat-ui.active { display: flex; animation: fadeIn 0.3s ease both; }

  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg-base);
    display: flex;
    flex-direction: column;
    padding: 16px 8px;
    gap: 4px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  #sidebar h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-muted);
    font-weight: 700;
    margin: 8px 12px 6px;
  }
  #room-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
    flex: 1;
  }
  .room-item {
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .room-item:hover { background: var(--surface-2); color: var(--text); }
  .room-item.active {
    background: var(--surface-card);
    color: var(--text);
    font-weight: 700;
  }
  .room-item.active::before {
    content: "# ";
    color: var(--accent);
  }
  .room-item:not(.active)::before {
    content: "# ";
    color: var(--text-muted);
  }
  #create-room-btn {
    margin: 8px 4px 0;
    background: var(--surface-2);
    color: var(--text);
    border: none;
    padding: 10px 12px;
    border-radius: 500px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.15s ease;
  }
  #create-room-btn:hover { background: #2a2a2a; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header .room-title {
    font-size: 18px;
    font-weight: 700;
  }
  #presence-pill {
    background: var(--surface-2);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 500px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
  }
  #presence-pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--surface);
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    animation: msgIn 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg .sender {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin: 0 6px 3px;
  }
  .msg .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    background: var(--surface-card);
    color: var(--text);
    word-break: break-word;
    box-shadow: var(--shadow-medium);
  }
  .msg.me .bubble { background: var(--accent); color: #000; font-weight: 500; }
  .msg .bubble img {
    max-width: 240px;
    max-height: 240px;
    border-radius: 10px;
    display: block;
  }
  .msg .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin: 3px 6px 0;
  }

  .reactions-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin: 4px 6px 0;
  }
  .reaction-chip {
    background: var(--surface-2);
    border: 1px solid transparent;
    color: var(--text);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 500px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: transform 0.1s ease, border-color 0.15s ease;
  }
  .reaction-chip:hover { transform: scale(1.08); }
  .reaction-chip.mine { border-color: var(--accent); color: var(--accent); }
  .add-reaction-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 500px;
    cursor: pointer;
  }
  .add-reaction-btn:hover { color: var(--text); border-color: var(--text-muted); }

  .emoji-picker {
    display: flex;
    gap: 4px;
    background: var(--surface-card);
    padding: 6px;
    border-radius: 500px;
    box-shadow: var(--shadow-heavy);
    position: absolute;
    animation: popIn 0.15s ease both;
    z-index: 10;
  }
  .emoji-picker button {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    transition: background 0.1s ease;
  }
  .emoji-picker button:hover { background: var(--surface-2); }

  .system {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin: 2px 0;
    animation: fadeIn 0.3s ease both;
  }

  #typing-indicator {
    height: 18px;
    padding: 0 20px 4px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .typing-dots { display: inline-flex; gap: 2px; }
  .typing-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

  #image-preview {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 20px 0;
  }
  #image-preview.active { display: flex; }
  #image-preview img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 8px;
  }
  #image-preview button {
    background: var(--surface-2);
    color: var(--text-muted);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
  }

  #composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: var(--surface);
  }
  #composer input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    border-radius: 500px;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    font-size: 16px;
    outline: none;
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
  }
  #upload-btn, #send-btn {
    background: var(--surface-2);
    color: var(--text);
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    touch-action: manipulation;
    transition: transform 0.12s ease, background 0.15s ease;
  }
  #send-btn { background: var(--accent); color: #000; }
  #upload-btn:hover { background: #2a2a2a; }
  #send-btn:hover { background: #22e065; transform: scale(1.05); }
  #send-btn:active, #upload-btn:active { transform: scale(0.92); }

  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(22px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-3px); opacity: 1; }
  }

  #messages::-webkit-scrollbar, #room-list::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-thumb, #room-list::-webkit-scrollbar-thumb {
    background: var(--surface-card);
    border-radius: 4px;
  }

  /* ---------- Room modal ---------- */
  #modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  #modal-backdrop.open { opacity: 1; pointer-events: auto; }
  #room-modal {
    background: var(--surface-card);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    box-shadow: var(--shadow-heavy);
    transform: scale(0.94) translateY(6px);
    opacity: 0;
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.18s ease;
  }
  #modal-backdrop.open #room-modal { transform: scale(1) translateY(0); opacity: 1; }
  #room-modal h3 {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 700;
  }
  #room-modal input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 500px;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    font-size: 16px;
    outline: none;
    box-shadow: rgb(18, 18, 18) 0px 1px 0px, rgb(124, 124, 124) 0px 0px 0px 1px inset;
  }
  #room-modal .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 18px;
  }
  .btn-text {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 500px;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .btn-text:hover { color: var(--text); background: var(--surface-2); }
  .btn-pill.small { padding: 10px 24px; font-size: 12px; }

  /* ---------- Mobile ---------- */
  #menu-btn { display: none; }
  #sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

  @media (max-width: 640px) {
    body { padding: 0; }
    #app {
      max-width: none;
      max-height: none;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
    #menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      touch-action: manipulation;
      margin-right: 12px;
    }
    header { gap: 8px; }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100dvh;
      width: 78%;
      max-width: 280px;
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: var(--shadow-heavy);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-backdrop { display: block; }
    .msg { max-width: 84%; }
    #composer { padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="login">
    <h2><span class="accent-dot"></span>Chatroom</h2>
    <div id="auth-tabs">
      <button type="button" class="tab active" data-tab="login">로그인</button>
      <button type="button" class="tab" data-tab="signup">회원가입</button>
    </div>

    <form id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="이메일" autocomplete="email" />
      <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" />
      <button type="submit" class="btn-pill">로그인</button>
      <div class="auth-message" id="login-message"></div>
    </form>

    <form id="signup-form" class="auth-form hidden">
      <input id="signup-username" placeholder="닉네임" maxlength="30" autocomplete="nickname" />
      <input type="email" id="signup-email" placeholder="이메일" autocomplete="email" />
      <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" />
      <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인" autocomplete="new-password" />
      <button type="submit" class="btn-pill">회원가입</button>
      <div class="auth-message" id="signup-message"></div>
    </form>
  </div>

  <div id="chat-ui">
    <div id="sidebar-backdrop"></div>
    <aside id="sidebar">
      <h3>채팅방</h3>
      <ul id="room-list"></ul>
      <button id="create-room-btn">+ 방 만들기</button>
    </aside>

    <div id="main">
      <header>
        <button id="menu-btn" title="채팅방 목록">☰</button>
        <span class="room-title" id="room-title">일반</span>
        <span style="display:flex; align-items:center;">
          <span id="presence-pill"><span class="dot"></span><span id="presence-count">0</span>명 접속 중</span>
          <button id="logout-btn">나가기</button>
        </span>
      </header>

      <div id="messages"></div>

      <div id="typing-indicator"></div>

      <div id="image-preview">
        <img id="preview-img" src="" alt="" />
        <button id="remove-preview">×</button>
      </div>

      <form id="composer">
        <input type="file" id="file-input" accept="image/*" class="hidden" />
        <button type="button" id="upload-btn" title="이미지 첨부">📎</button>
        <input type="text" id="message-input" placeholder="메시지를 입력하세요" autocomplete="off" maxlength="500" />
        <button type="submit" id="send-btn" title="전송">➤</button>
      </form>
    </div>
  </div>
</div>

<div id="modal-backdrop">
  <div id="room-modal">
    <h3>새 채팅방 만들기</h3>
    <input id="new-room-input" placeholder="방 이름을 입력하세요" maxlength="40" />
    <div class="modal-actions">
      <button type="button" id="modal-cancel-btn" class="btn-text">취소</button>
      <button type="button" id="modal-create-btn" class="btn-pill small">만들기</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let socket = null;
  let username = "";
  let currentRoomId = null;
  let rooms = [];
  let pendingImage = null; // { url, mimeType }
  let typingTimeout = null;
  const typingUsers = new Set();

  const loginEl = document.getElementById("login");
  const chatUiEl = document.getElementById("chat-ui");
  const authTabs = document.querySelectorAll("#auth-tabs .tab");
  const loginForm = document.getElementById("login-form");
  const signupForm = document.getElementById("signup-form");
  const loginEmailInput = document.getElementById("login-email");
  const loginPasswordInput = document.getElementById("login-password");
  const loginMessageEl = document.getElementById("login-message");
  const signupUsernameInput = document.getElementById("signup-username");
  const signupEmailInput = document.getElementById("signup-email");
  const signupPasswordInput = document.getElementById("signup-password");
  const signupPasswordConfirmInput = document.getElementById("signup-password-confirm");
  const signupMessageEl = document.getElementById("signup-message");
  const logoutBtn = document.getElementById("logout-btn");
  const roomListEl = document.getElementById("room-list");
  const createRoomBtn = document.getElementById("create-room-btn");
  const roomTitleEl = document.getElementById("room-title");
  const presenceCountEl = document.getElementById("presence-count");
  const messagesEl = document.getElementById("messages");
  const typingIndicatorEl = document.getElementById("typing-indicator");
  const composer = document.getElementById("composer");
  const messageInput = document.getElementById("message-input");
  const fileInput = document.getElementById("file-input");
  const uploadBtn = document.getElementById("upload-btn");
  const imagePreviewEl = document.getElementById("image-preview");
  const previewImgEl = document.getElementById("preview-img");
  const removePreviewBtn = document.getElementById("remove-preview");
  const menuBtn = document.getElementById("menu-btn");
  const sidebarEl = document.getElementById("sidebar");
  const sidebarBackdropEl = document.getElementById("sidebar-backdrop");
  const modalBackdropEl = document.getElementById("modal-backdrop");
  const newRoomInput = document.getElementById("new-room-input");
  const modalCancelBtn = document.getElementById("modal-cancel-btn");
  const modalCreateBtn = document.getElementById("modal-create-btn");

  const EMOJI_SET = ["👍", "❤️", "😂", "😮", "😢"];

  function scrollToBottom(smooth = true) {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? "smooth" : "auto" });
  }

  function openDrawer() {
    sidebarEl.classList.add("open");
    sidebarBackdropEl.classList.add("open");
  }
  function closeDrawer() {
    sidebarEl.classList.remove("open");
    sidebarBackdropEl.classList.remove("open");
  }
  menuBtn.addEventListener("click", () => {
    sidebarEl.classList.contains("open") ? closeDrawer() : openDrawer();
  });
  sidebarBackdropEl.addEventListener("click", closeDrawer);

  function openRoomModal() {
    modalBackdropEl.classList.add("open");
    newRoomInput.value = "";
    setTimeout(() => newRoomInput.focus(), 50);
  }
  function closeRoomModal() {
    modalBackdropEl.classList.remove("open");
  }
  async function submitNewRoom() {
    const name = newRoomInput.value.trim();
    if (!name) return;
    const res = await fetch("/api/rooms", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    const room = await res.json();
    rooms.push(room);
    closeRoomModal();
    switchRoom(room.id);
    closeDrawer();
  }
  modalCancelBtn.addEventListener("click", closeRoomModal);
  modalBackdropEl.addEventListener("click", (e) => {
    if (e.target === modalBackdropEl) closeRoomModal();
  });
  modalCreateBtn.addEventListener("click", submitNewRoom);
  newRoomInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitNewRoom();
    if (e.key === "Escape") closeRoomModal();
  });

  function closeAnyEmojiPicker() {
    document.querySelectorAll(".emoji-picker").forEach((el) => el.remove());
  }

  function renderReactions(container, messageId, reactions) {
    container.innerHTML = "";
    const grouped = new Map();
    reactions.forEach(({ emoji, username: who }) => {
      if (!grouped.has(emoji)) grouped.set(emoji, []);
      grouped.get(emoji).push(who);
    });

    grouped.forEach((users, emoji) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "reaction-chip" + (users.includes(username) ? " mine" : "");
      chip.textContent = `${emoji} ${users.length}`;
      chip.title = users.join(", ");
      chip.addEventListener("click", () => {
        socket.emit("reaction", { messageId, emoji });
      });
      container.appendChild(chip);
    });

    const addBtn = document.createElement("button");
    addBtn.type = "button";
    addBtn.className = "add-reaction-btn";
    addBtn.textContent = "+";
    addBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      closeAnyEmojiPicker();
      const picker = document.createElement("div");
      picker.className = "emoji-picker";
      EMOJI_SET.forEach((emoji) => {
        const b = document.createElement("button");
        b.textContent = emoji;
        b.addEventListener("click", () => {
          socket.emit("reaction", { messageId, emoji });
          closeAnyEmojiPicker();
        });
        picker.appendChild(b);
      });
      document.body.appendChild(picker);
      const rect = addBtn.getBoundingClientRect();
      picker.style.top = `${rect.top - 44 + window.scrollY}px`;
      picker.style.left = `${rect.left + window.scrollX}px`;
    });
    container.appendChild(addBtn);
  }

  function renderMessage(msg, { scroll = true } = {}) {
    const { id, username: sender, content, image_url, created_at, reactions = [] } = msg;
    const wrapper = document.createElement("div");
    wrapper.className = "msg" + (sender === username ? " me" : "");
    wrapper.dataset.messageId = id;

    if (sender !== username) {
      const senderEl = document.createElement("div");
      senderEl.className = "sender";
      senderEl.textContent = sender;
      wrapper.appendChild(senderEl);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (image_url) {
      const img = document.createElement("img");
      img.src = image_url;
      img.alt = "attachment";
      bubble.appendChild(img);
    }
    if (content) {
      const p = document.createElement("div");
      p.textContent = content;
      if (image_url) p.style.marginTop = "6px";
      bubble.appendChild(p);
    }

    const meta = document.createElement("div");
    meta.className = "meta";
    const time = created_at
      ? new Date(created_at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" })
      : "";
    meta.textContent = time;

    const reactionsRow = document.createElement("div");
    reactionsRow.className = "reactions-row";
    renderReactions(reactionsRow, id, reactions);

    wrapper.appendChild(bubble);
    wrapper.appendChild(meta);
    wrapper.appendChild(reactionsRow);
    messagesEl.appendChild(wrapper);
    if (scroll) scrollToBottom();
  }

  function renderSystem(text) {
    const el = document.createElement("div");
    el.className = "system";
    el.textContent = text;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function updateTypingIndicator() {
    if (typingUsers.size === 0) {
      typingIndicatorEl.innerHTML = "";
      return;
    }
    const names = [...typingUsers].join(", ");
    typingIndicatorEl.innerHTML =
      `${names}님이 입력 중 <span class="typing-dots"><span></span><span></span><span></span></span>`;
  }

  async function loadHistory(roomId) {
    messagesEl.innerHTML = "";
    try {
      const res = await fetch(`/api/messages?room_id=${roomId}`);
      const data = await res.json();
      data.forEach((m) => renderMessage(m, { scroll: false }));
      scrollToBottom(false);
    } catch (err) {
      console.error("Failed to load history", err);
    }
  }

  async function loadRooms() {
    const res = await fetch("/api/rooms");
    rooms = await res.json();
    renderRoomList();
    if (!currentRoomId && rooms.length > 0) {
      switchRoom(rooms[0].id);
    }
  }

  function renderRoomList() {
    roomListEl.innerHTML = "";
    rooms.forEach((room) => {
      const li = document.createElement("li");
      li.className = "room-item" + (room.id === currentRoomId ? " active" : "");
      li.textContent = room.name;
      li.addEventListener("click", () => {
        switchRoom(room.id);
        closeDrawer();
      });
      roomListEl.appendChild(li);
    });
  }

  function switchRoom(roomId) {
    if (roomId === currentRoomId) return;
    currentRoomId = roomId;
    const room = rooms.find((r) => r.id === roomId);
    roomTitleEl.textContent = room ? room.name : "";
    typingUsers.clear();
    updateTypingIndicator();
    renderRoomList();
    socket.emit("join room", { roomId });
    loadHistory(roomId);
  }

  function connectSocket() {
    if (socket) return;
    socket = io();

    socket.on("chat message", (msg) => renderMessage(msg));

    socket.on("reactions update", ({ messageId, reactions }) => {
      const wrapper = messagesEl.querySelector(`[data-message-id="${messageId}"]`);
      if (!wrapper) return;
      const row = wrapper.querySelector(".reactions-row");
      renderReactions(row, messageId, reactions);
    });

    socket.on("system message", renderSystem);

    socket.on("presence", (list) => {
      presenceCountEl.textContent = list.length;
    });

    socket.on("typing", ({ username: who }) => {
      if (who === username) return;
      typingUsers.add(who);
      updateTypingIndicator();
    });

    socket.on("stop typing", ({ username: who }) => {
      typingUsers.delete(who);
      updateTypingIndicator();
    });
  }

  async function enterChatAuthenticated(name) {
    username = name;
    loginEl.classList.add("hidden");
    chatUiEl.classList.add("active");
    connectSocket();
    await loadRooms();
    messageInput.focus();
  }

  function setActiveTab(tabName) {
    authTabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tabName));
    loginForm.classList.toggle("hidden", tabName !== "login");
    signupForm.classList.toggle("hidden", tabName !== "signup");
  }

  authTabs.forEach((btn) => {
    btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
  });

  function showMessage(el, text, type) {
    el.textContent = text;
    el.className = "auth-message" + (type ? ` ${type}` : "");
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    showMessage(loginMessageEl, "", "");
    const email = loginEmailInput.value.trim();
    const password = loginPasswordInput.value;
    if (!email || !password) return;

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        showMessage(loginMessageEl, data.error || "로그인에 실패했습니다.", "error");
        return;
      }
      await enterChatAuthenticated(data.username);
    } catch (err) {
      showMessage(loginMessageEl, "네트워크 오류가 발생했습니다.", "error");
    }
  });

  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    showMessage(signupMessageEl, "", "");
    const username_ = signupUsernameInput.value.trim();
    const email = signupEmailInput.value.trim();
    const password = signupPasswordInput.value;
    const passwordConfirm = signupPasswordConfirmInput.value;

    if (password !== passwordConfirm) {
      showMessage(signupMessageEl, "비밀번호가 일치하지 않습니다.", "error");
      return;
    }

    try {
      const res = await fetch("/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username_, email, password, passwordConfirm }),
      });
      const data = await res.json();
      if (!res.ok) {
        showMessage(signupMessageEl, data.error || "회원가입에 실패했습니다.", "error");
        return;
      }
      showMessage(signupMessageEl, data.message, "success");
      signupForm.reset();
      setTimeout(() => setActiveTab("login"), 1500);
    } catch (err) {
      showMessage(signupMessageEl, "네트워크 오류가 발생했습니다.", "error");
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await fetch("/api/auth/logout", { method: "POST" });
    location.reload();
  });

  (async function restoreSession() {
    try {
      const res = await fetch("/api/auth/me");
      if (!res.ok) return;
      const data = await res.json();
      await enterChatAuthenticated(data.username);
    } catch (err) {
      // not logged in, stay on login screen
    }
  })();

  createRoomBtn.addEventListener("click", openRoomModal);

  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("file", file);
    uploadBtn.textContent = "…";
    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      pendingImage = data.url;
      previewImgEl.src = data.url;
      imagePreviewEl.classList.add("active");
    } catch (err) {
      console.error("Upload failed", err);
    } finally {
      uploadBtn.textContent = "📎";
      fileInput.value = "";
    }
  });

  removePreviewBtn.addEventListener("click", () => {
    pendingImage = null;
    imagePreviewEl.classList.remove("active");
  });

  let isTyping = false;
  messageInput.addEventListener("input", () => {
    if (!isTyping) {
      isTyping = true;
      socket.emit("typing");
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isTyping = false;
      socket.emit("stop typing");
    }, 1200);
  });

  composer.addEventListener("submit", (e) => {
    e.preventDefault();
    const content = messageInput.value.trim();
    if (!content && !pendingImage) return;
    socket.emit("chat message", { content, imageUrl: pendingImage });
    messageInput.value = "";
    pendingImage = null;
    imagePreviewEl.classList.remove("active");
    clearTimeout(typingTimeout);
    if (isTyping) {
      isTyping = false;
      socket.emit("stop typing");
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".add-reaction-btn") && !e.target.closest(".emoji-picker")) {
      closeAnyEmojiPicker();
    }
  });

</script>
</body>
</html>
